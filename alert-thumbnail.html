<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpSignal Developer Handoff - Single Dot Scrub</title>
    <style>
        :root {
            --sidebar-blue: #005a8d;
            --bg-gray: #f4f7f9;
            --op-cyan: #00aeef;
            --high-priority: #ff6b81;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-gray);
            overflow: hidden;
        }

        /* --- FOCUS MODE LOGIC --- */
        .handoff-blur {
            filter: blur(10px);
            pointer-events: none;
            user-select: none;
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        .focus-container {
            position: absolute;
            z-index: 999;
            top: 50%;
            left: 55%; 
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 100vmax rgba(244, 247, 249, 0.8);
            padding: 20px;
            background: white;
            border-radius: 12px;
            border: 2px solid var(--op-cyan);
        }

        aside { width: 240px; background-color: var(--sidebar-blue); color: white; padding: 20px; }
        main { flex: 1; padding: 40px; }
        header { margin-bottom: 30px; }

        /* Component under review */
        .thumbnail-container {
            width: 400px; 
            height: 225px;
            background: #000;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            cursor: ew-resize;
        }

        video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .scrub-bar {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .progress-fill {
            height: 100%;
            background: var(--op-cyan);
            width: 0%;
            border-radius: 3px;
        }

        .intelligence-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            top: -1.5px;
            transform: translateX(-50%);
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <aside class="handoff-blur">
        <div style="font-weight:bold; font-size:1.2rem; margin-bottom:20px;">OpSignal</div>
        <div style="margin-bottom:10px; opacity:0.5;">Alerts Dashboard</div>
        <div style="margin-bottom:10px; opacity:0.5;">All Activity</div>
    </aside>

    <main class="handoff-blur">
        <header>
            <h1>Alerts Dashboard</h1>
            <div style="width:100%; height:200px; background:#ddd; border-radius:8px;"></div>
        </header>
    </main>

    <div class="focus-container">
        <div style="margin-bottom: 15px; font-weight: bold; color: var(--sidebar-blue);">
            PROTOTYPE: Hover-Scrub & Single Intelligence Dot
        </div>
        
        <div class="thumbnail-container" id="scrubContainer">
            <video id="alertVideo" muted loop playsinline>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
            
            <div class="scrub-bar">
                <div class="progress-fill" id="progressFill"></div>
                <div class="intelligence-dot" style="left: 45%;"></div>
            </div>
        </div>

        <div style="margin-top: 15px; font-size: 0.8rem; color: #666; max-width: 400px;">
            <strong>Developer Note:</strong> The single dot marks the "Peak Incident" frame. Horizontal mouse movement across the thumbnail updates <code>currentTime</code> on the video element.
        </div>
    </div>

    <script>
        const container = document.getElementById('scrubContainer');
        const video = document.getElementById('alertVideo');
        const progress = document.getElementById('progressFill');

        // Scrubbing Interaction
        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percent = Math.min(Math.max(x / rect.width, 0), 1);

            if (video.duration) {
                video.currentTime = video.duration * percent;
            }
            progress.style.width = (percent * 100) + '%';
        });

        video.addEventListener('loadedmetadata', () => {
            video.currentTime = 0;
        });
    </script>
</body>
</html>
